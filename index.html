<!doctype html>
<html lang="en">
<head>
  <title>LoginSource</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://unicons.iconscout.com/release/v2.1.9/css/unicons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css"> 
  <script src="https://apis.google.com/js/platform.js" async defer></script>
</head>
<body>
  <div class="section">
    <div class="container">
      <div class="row full-height justify-content-center">
        <div class="col-12 text-center align-self-center py-5">
          <div class="section pb-5 pt-5 pt-sm-2 text-center">
            <h6 class="mb-0 pb-3"><span>Log In </span><span>Sign Up</span></h6>
            <input class="checkbox" type="checkbox" id="reg-log" name="reg-log"/>
            <label for="reg-log"></label>
            <div class="card-3d-wrap mx-auto">
              <div class="card-3d-wrapper">
                <div class="card-front">
                  <div class="center-wrap">
                    <div class="section text-center">
                      <h4 class="mb-4 pb-3">Log In</h4>
                      <div class="form-group">
                        <input type="email" class="form-style" placeholder="Email/User">
                        <i class="input-icon uil uil-at"></i>
                      </div>
                      <div class="form-group mt-2">
                        <input type="password" class="form-style" placeholder="Password">
                        <i class="input-icon uil uil-lock-alt"></i>
                      </div>
                      <button id="loginButton" class="btn mt-4">Login</button>
                      <p class="mb-0 mt-4 text-center"><a href="https://panel.cfars.web.id" class="link">Forgot your password?</a></p>
                    </div>
                  </div>
                </div>
                <div class="card-back">
                  <div class="center-wrap">
                    <div class="section text-center">
                      <h4 class="mb-3 pb-3">Sign Up</h4>
                      <div class="form-group">
                        <input type="text" class="form-style" placeholder="Full Name">
                        <i class="input-icon uil uil-user"></i>
                      </div>
                      <div class="form-group mt-2">
                        <input type="tel" class="form-style" placeholder="Phone Number">
                        <i class="input-icon uil uil-phone"></i>
                      </div>
                      <div class="form-group mt-2">
                        <input type="email" class="form-style" placeholder="Email">
                        <i class="input-icon uil uil-at"></i>
                      </div>
                      <div class="form-group mt-2">
                        <input type="password" class="form-style" placeholder="Password">
                        <i class="input-icon uil uil-lock-alt"></i>
                      </div>
                      <button id="registerButton" class="btn mt-4">Register</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const apiKey = 'AIzaSyBsq0z66e0VDayqKtIp6V5OTiQlHT7UeM8'; // Your API key

    document.getElementById('loginButton').addEventListener('click', function() {
      // Logic for login using Google Cloud Auth API (using API Key)
      // Example (replace with your actual implementation):
      const email = document.querySelector('.card-front input[type="email"]').value;
      const password = document.querySelector('.card-front input[type="password"]').value;

      // In a real-world scenario, you would send this data to your backend,
      // which would then use the Google Cloud Auth API with the API key
      // to authenticate the user.
      console.log('Login attempt:', email, password, apiKey);

      // Example fetch request (replace with your actual endpoint)
      fetch('/your-login-endpoint', { //Replace with your backend endpoint.
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}` //If needed by your backend.
        },
        body: JSON.stringify({ email: email, password: password })
      })
      .then(response => response.json())
      .then(data => {
          console.log('Login response:', data);
          // Handle response (e.g., redirect on success, show error on failure)
      })
      .catch(error => {
          console.error('Login error:', error);
          // Handle error
      });
    });

    document.getElementById('registerButton').addEventListener('click', function() {
      // Logic for registration using Google Cloud Auth API (using API Key)
      // Example (replace with your actual implementation):
      const fullName = document.querySelector('.card-back input[type="text"]').value;
      const phoneNumber = document.querySelector('.card-back input[type="tel"]').value;
      const email = document.querySelector('.card-back input[type="email"]').value;
      const password = document.querySelector('.card-back input[type="password"]').value;

      console.log('Register attempt:', fullName, phoneNumber, email, password, apiKey);

      fetch('/your-register-endpoint', { //Replace with your backend endpoint.
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}` //If needed by your backend.
        },
        body: JSON.stringify({ fullName: fullName, phoneNumber: phoneNumber, email: email, password: password })
      })
      .then(response => response.json())
      .then(data => {
          console.log('Register response:', data);
          // Handle response (e.g., redirect on success, show error on failure)
      })
      .catch(error => {
          console.error('Register error:', error);
          // Handle error
      });
    });

  </script>
</body>
</html>
